version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: book-review-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER:-bookuser}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-bookpassword}
      POSTGRES_DB: ${DB_NAME:-book_review_db}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "${DB_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-bookuser} -d ${DB_NAME:-book_review_db}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - book-review-network

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: book-review-pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL:-admin@example.com}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD:-admin}
      PGADMIN_CONFIG_SERVER_MODE: 'False'
      PGADMIN_CONFIG_MASTER_PASSWORD_REQUIRED: 'False'
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    ports:
      - "${PGADMIN_PORT:-5050}:80"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - book-review-network

volumes:
  postgres_data:
    driver: local
  pgadmin_data:
    driver: local

networks:
  book-review-network:
    driver: bridge
